<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN - Ultimate 3D Interactive</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; cursor: none; }
        
        /* 1. Nền Canvas cho chấm vàng tương tác */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; }

        /* 2. Custom Cursor với quầng sáng */
        #cursor-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; }
        #cursor-glow { 
            width: 300px; height: 300px; 
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%); 
            position: fixed; top: -150px; left: -150px; pointer-events: none; z-index: 999; 
        }

        .main-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 1500px; }

        /* Lõi JN */
        .jn-core { position: relative; z-index: 100; text-align: center; transform-style: preserve-3d; }
        .label-text { font-size: 11px; letter-spacing: 5px; color: #666; text-transform: uppercase; }
        #jn-logo { font-size: 110px; font-weight: 900; letter-spacing: -8px; line-height: 1; color: #fff; margin: 10px 0; }
        .sub-gold { color: var(--gold); font-size: 9px; text-transform: uppercase; letter-spacing: 6px; font-weight: 800; }

        /* Orbiting Text (Hệ mặt trời) */
        .orbit-text { position: absolute; white-space: nowrap; font-size: 11px; font-weight: 800; text-transform: uppercase; color: var(--gold); pointer-events: none; }

        /* Hexagon SVG */
        #hex-svg { position: absolute; width: 500px; height: 500px; pointer-events: none; }
        .base-hex { fill: none; stroke: rgba(255,255,255,0.05); stroke-width: 1; }
        .draw-hex { fill: none; stroke: var(--gold); stroke-width: 2.5; stroke-dasharray: 1800; stroke-dashoffset: 1800; filter: drop-shadow(0 0 8px var(--gold)); }

        /* Service Cards (3D Tilt) */
        .card-wrapper { position: absolute; perspective: 1000px; z-index: 110; }
        .service-card {
            width: 240px; padding: 20px; background: #ffffff; color: #111;
            border-radius: 12px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            opacity: 0; transform: scale(0.8); pointer-events: none;
            transition: transform 0.1s ease-out; transform-style: preserve-3d;
        }
        .service-card.active { opacity: 1; transform: scale(1); pointer-events: all; }
        
        .card-icon { font-size: 26px; margin-bottom: 10px; }
        .card-title { font-weight: 800; font-size: 14px; color: var(--gold); text-transform: uppercase; }
        .card-sub { font-size: 10px; color: #888; margin-bottom: 10px; font-weight: 600; }
        .bullet-list { font-size: 11px; color: #444; list-style: none; border-top: 1px solid #eee; padding-top: 8px; }
        .bullet-list li::before { content: "• "; color: var(--gold); }

        h1 { position: absolute; top: 10%; font-size: 40px; font-weight: 800; letter-spacing: -1px; z-index: 10; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="main-container">
        <h1>What can I do <span style="color:var(--gold); font-style: italic;">for you?</span></h1>

        <div class="jn-core">
            <div class="label-text">what can (do)</div>
            <div id="jn-logo">JN</div>
            <div class="label-text">do for you?</div>
            <div class="sub-gold">Creative Developer</div>

            <div class="orbit-text" id="planet1">Digital Design</div>
            <div class="orbit-text" id="planet2">Frontend Web Developer</div>
        </div>

        <svg id="hex-svg" viewBox="0 0 600 600">
            <path class="base-hex" d="M 300 50 L 516 175 L 516 425 L 300 550 L 84 425 L 84 175 Z" />
            <path class="draw-hex" id="active-line" d="M 300 50 L 516 175 L 516 425 L 300 550 L 84 425 L 84 175 Z" />
        </svg>

        <div id="elements-layer"></div>
    </div>

    <script>
        const services = [
            { icon: "🎨", title: "Web Design & Build", sub: "Landing pages & Apps", items: ["HTML/CSS/JS", "WordPress & Webflow", "Framer sites"] },
            { icon: "🧩", title: "Visual Design", sub: "Branding & Assets", items: ["Social Graphics", "Digital Ads", "UI Components"] },
            { icon: "🎬", title: "Motion & Video", sub: "Short-form content", items: ["After Effects", "CapCut", "AI Video (Veo 3)"] },
            { icon: "✨", title: "Interactive UX", sub: "Experience design", items: ["Canvas API", "Web Audio", "Micro-interactions"] },
            { icon: "🤖", title: "AI-Powered", sub: "Efficiency & Tech", items: ["AI Image Gen", "Rapid Prototyping", "AI Copywriting"] },
            { icon: "📊", title: "Marketing", sub: "Growth & SEO", items: ["On-page SEO", "Product Hunt", "Social Strategy"] }
        ];

        // --- 1. Background Particles (Interactive) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: -100, y: -100 };

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.dispatchEvent(new Event('resize'));

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.baseX = this.x; this.baseY = this.y;
                this.size = Math.random() * 2;
                this.density = (Math.random() * 30) + 1;
            }
            draw() {
                ctx.fillStyle = 'rgba(212, 175, 55, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
            update() {
                let dx = mouse.x - this.x; let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let forceDirectionX = dx / distance; let forceDirectionY = dy / distance;
                let maxDistance = 150;
                let force = (maxDistance - distance) / maxDistance;
                if (distance < maxDistance) {
                    this.x -= forceDirectionX * force * this.density;
                    this.y -= forceDirectionY * force * this.density;
                } else {
                    if (this.x !== this.baseX) this.x -= (this.x - this.baseX) * 0.1;
                    if (this.y !== this.baseY) this.y -= (this.y - this.baseY) * 0.1;
                }
            }
        }
        for(let i=0; i<150; i++) particles.push(new Particle());
        function animateBg() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(animateBg); }
        animateBg();

        // --- 2. Build Hex Grid ---
        const layer = document.getElementById('elements-layer');
        const cx = window.innerWidth/2; const cy = window.innerHeight/2; const r = 250;
        const pts = [
            {x: cx, y: cy-r}, {x: cx+r*0.866, y: cy-r*0.5}, {x: cx+r*0.866, y: cy+r*0.5},
            {x: cx, y: cy+r}, {x: cx-r*0.866, y: cy+r*0.5}, {x: cx-r*0.866, y: cy-r*0.5}
        ];

        services.forEach((s, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'card-wrapper';
            const angle = (i * 60 - 90) * (Math.PI / 180);
            wrap.style.left = `${pts[i].x + Math.cos(angle)*100 - 120}px`;
            wrap.style.top = `${pts[i].y + Math.sin(angle)*50 - 60}px`;

            wrap.innerHTML = `
                <div class="service-card card-${i}">
                    <div class="card-icon">${s.icon}</div>
                    <div class="card-title">${i+1}. ${s.title}</div>
                    <div class="card-sub">${s.sub}</div>
                    <ul class="bullet-list">${s.items.map(li => `<li>${li}</li>`).join('')}</ul>
                </div>
            `;
            layer.appendChild(wrap);
        });

        // --- 3. Mouse Tilt & Custom Cursor ---
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX; mouse.y = e.clientY;
            gsap.to("#cursor-dot", { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to("#cursor-glow", { x: e.clientX, y: e.clientY, duration: 0.4 });

            // 3D Tilt cho các Card
            document.querySelectorAll('.service-card.active').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left - rect.width/2;
                const y = e.clientY - rect.top - rect.height/2;
                gsap.to(card, { rotationY: x/10, rotationX: -y/10, duration: 0.5 });
            });
        });

        // --- 4. Animation Sequence ---
        const tl = gsap.timeline();
        tl.from(".jn-core", { opacity: 0, scale: 0.5, duration: 1.5, ease: "expo.out" })
          .to("#active-line", { strokeDashoffset: 0, duration: 7, ease: "none", onUpdate: function() {
              const p = this.progress();
              services.forEach((_, i) => { if (p >= i/6) document.querySelector(`.card-${i}`).classList.add('active'); });
          }});

        // Orbit Loop
        function setupOrbit(id, rx, ry, delay) {
            gsap.to({}, { duration: 12, repeat: -1, ease: "none", onUpdate: function() {
                const time = (Date.now() * 0.001 * 1.5) + delay;
                const x = Math.cos(time) * rx; const y = Math.sin(time) * ry; const z = Math.sin(time) * 80;
                const scale = gsap.utils.mapRange(-80, 80, 0.7, 1.2, z);
                gsap.set(id, { x, y, scale, opacity: scale, zIndex: Math.round(z)+50 });
            }});
        }
        setupOrbit("#planet1", 130, 40, 0);
        setupOrbit("#planet2", 150, -30, Math.PI);
    </script>
</body>
</html>

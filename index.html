<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN - Minimalist 3D Hex</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; cursor: default; }
        
        /* Chấm vàng nền tĩnh lặng */
        .bg-dots {
            position: fixed; inset: 0; z-index: -1;
            background-image: radial-gradient(rgba(212, 175, 55, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .main-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; perspective: 1000px; }

        /* JN Center */
        .jn-center { position: relative; z-index: 100; text-align: center; }
        #jn-logo { font-size: 110px; font-weight: 900; letter-spacing: -8px; color: #fff; line-height: 1; margin: 10px 0; }
        .badge-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; pointer-events: none; }
        .badge-path { fill: none; }
        .badge-text { font-size: 11px; font-weight: 800; text-transform: uppercase; fill: var(--gold); letter-spacing: 5px; }

        /* Title */
        .top-header { position: absolute; top: 8%; width: 100%; text-align: center; z-index: 10; }
        .top-header h1 { font-size: 42px; font-weight: 800; letter-spacing: -1px; }

        /* Hexagon Path */
        #hex-svg { position: absolute; width: 480px; height: 480px; pointer-events: none; }
        .draw-hex { fill: none; stroke: var(--gold); stroke-width: 1.5; stroke-dasharray: 1800; stroke-dashoffset: 1800; opacity: 0.5; }

        /* Service Cards - No White Box */
        .card-wrapper { position: absolute; z-index: 110; }
        .service-card {
            width: 240px; padding: 20px; 
            border: 1px solid var(--gold); 
            background: transparent;
            opacity: 0; transform: translateY(20px);
            transition: border-width 0.3s;
            cursor: pointer;
            transform-style: preserve-3d;
        }
        
        .card-title { font-weight: 800; font-size: 13px; color: var(--gold); text-transform: uppercase; margin-bottom: 5px; pointer-events: none; }
        .card-sub { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0; pointer-events: none; }
        
        /* Nội dung hiện ra khi click */
        .card-content { 
            max-height: 0; overflow: hidden; opacity: 0; 
            transition: all 0.5s ease; border-top: 0px solid rgba(212, 175, 55, 0.2);
            margin-top: 0;
        }
        .service-card.open { border-width: 2px; }
        .service-card.open .card-content { max-height: 200px; opacity: 1; margin-top: 15px; padding-top: 15px; border-top-width: 1px; }
        
        .bullet-list { font-size: 11px; color: #fff; list-style: none; line-height: 1.6; }
        .bullet-list li::before { content: "• "; color: var(--gold); margin-right: 5px; }
        
        .card-icon { font-size: 24px; position: absolute; top: -15px; right: -15px; opacity: 0; transition: opacity 0.3s; }
        .service-card:hover .card-icon { opacity: 1; }
    </style>
</head>
<body>

    <div class="bg-dots"></div>

    <div class="main-container">
        <div class="top-header">
            <h1>What I can do <span style="color:var(--gold); font-style: italic;">for you?</span></h1>
        </div>

        <div class="jn-center">
            <div id="jn-logo">JN</div>
            <svg class="badge-svg" viewBox="0 0 200 200">
                <path id="badgePath" d="M 100, 100 m -75, 0 a 75,75 0 1,1 150,0 a 75,75 0 1,1 -150,0" class="badge-path" />
                <text class="badge-text">
                    <textPath href="#badgePath" startOffset="0%">
                        • DIGITAL DESIGN • FRONTEND WEB DEVELOPER • DIGITAL DESIGN • FRONTEND WEB DEVELOPER
                    </textPath>
                </text>
            </svg>
            <div style="font-size: 10px; letter-spacing: 5px; text-transform: uppercase; color: #444; font-weight: 800; margin-top: -5px;">Creative Developer</div>
        </div>

        <svg id="hex-svg" viewBox="0 0 600 600">
            <path class="draw-hex" id="active-line" d="M 300 50 L 516 175 L 516 425 L 300 550 L 84 425 L 84 175 Z" />
        </svg>

        <div id="cards-layer"></div>
    </div>

    <script>
        const services = [
            { icon: "🎨", title: "Web Design & Build", sub: "Landing pages & Apps", items: ["HTML/CSS/JS", "WordPress & Webflow", "Framer sites"] },
            { icon: "🧩", title: "Visual Design", sub: "Branding & Assets", items: ["Social Graphics", "Digital Ads", "UI Components"] },
            { icon: "🎬", title: "Motion & Video", sub: "Short-form content", items: ["After Effects", "CapCut", "AI Video (Veo 3)"] },
            { icon: "✨", title: "Interactive UX", sub: "Experience design", items: ["Canvas API", "Web Audio", "Micro-interactions"] },
            { icon: "🤖", title: "AI-Powered", sub: "Efficiency & Tech", items: ["AI Image Gen", "Rapid Prototyping", "AI Copywriting"] },
            { icon: "📊", title: "Marketing", sub: "Growth & SEO", items: ["On-page SEO", "Product Hunt", "Social Strategy"] }
        ];

        const layer = document.getElementById('cards-layer');
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const r = 240; // Hex radius

        const pts = [
            {x:cx, y:cy-r}, {x:cx+r*0.866, y:cy-r*0.5}, {x:cx+r*0.866, y:cy+r*0.5},
            {x:cx, y:cy+r}, {x:cx-r*0.866, y:cy+r*0.5}, {x:cx-r*0.866, y:cy-r*0.5}
        ];

        services.forEach((s, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'card-wrapper';
            const ang = (i * 60 - 90) * (Math.PI/180);
            wrap.style.left = `${pts[i].x + Math.cos(ang)*110 - 120}px`;
            wrap.style.top = `${pts[i].y + Math.sin(ang)*60 - 50}px`;

            wrap.innerHTML = `
                <div class="service-card" onclick="this.classList.toggle('open')">
                    <div class="card-icon">${s.icon}</div>
                    <div class="card-title">${i+1}. ${s.title}</div>
                    <div class="card-sub">${s.sub}</div>
                    <div class="card-content">
                        <ul class="bullet-list">${s.items.map(li => `<li>${li}</li>`).join('')}</ul>
                    </div>
                </div>
            `;
            layer.appendChild(wrap);
        });

        // GSAP Animations
        const tl = gsap.timeline();

        // Rotate Badge
        gsap.to(".badge-svg", { rotation: 360, duration: 25, repeat: -1, ease: "none" });

        // Intro & Draw Hex
        tl.from(".jn-center", { opacity: 0, scale: 0.8, duration: 1.5, ease: "expo.out" })
          .to("#active-line", { strokeDashoffset: 0, duration: 7, ease: "none", onUpdate: function() {
              const p = this.progress();
              document.querySelectorAll('.service-card').forEach((card, i) => {
                  if (p >= i/6) gsap.to(card, { opacity: 1, y: 0, duration: 0.5, overwrite: "auto" });
              });
          }});

        // 3D Hover Effect (Only on Hover)
        document.querySelectorAll('.service-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width/2) / 8;
                const y = (e.clientY - rect.top - rect.height/2) / 8;
                gsap.to(card, { 
                    rotationY: x, 
                    rotationX: -y, 
                    y: -10,
                    boxShadow: "0 20px 40px rgba(212, 175, 55, 0.2)",
                    duration: 0.4 
                });
            });

            card.addEventListener('mouseleave', () => {
                gsap.to(card, { 
                    rotationY: 0, 
                    rotationX: 0, 
                    y: 0,
                    boxShadow: "none",
                    duration: 0.5 
                });
            });
        });

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN - What I can do for you?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#0a0a0a',
                        white: '#fafafa',
                        gold: '#d4af37',
                        'light-gold': '#ffebc4',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #fafafa;
            overflow: hidden;
            background-image: radial-gradient(var(--light-gold) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .central-node {
            position: relative;
            z-index: 10;
        }

        .hexagon-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .service-card {
            position: absolute;
            width: 280px;
            padding: 20px;
            background: #fafafa;
            color: #0a0a0a;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            transition: all 0.4s ease;
            cursor: pointer;
            z-index: 5;
        }

        .service-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .card-number {
            font-size: 3rem;
            color: #d4af37;
            font-weight: bold;
            line-height: 1;
        }

        .bullet-point {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #d4af37;
            pointer-events: none;
            display: none;
        }

        .bullet-point-revealed {
            display: block;
        }

        .icon-circle {
            position: absolute;
            width: 50px;
            height: 50px;
            background: #fafafa;
            border-radius: 50%;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            transition: all 0.4s ease;
            pointer-events: none;
        }

        .orbiting-text {
            position: absolute;
            font-size: 0.8rem;
            color: #ffebc4;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            will-change: transform;
            pointer-events: none;
        }
    </style>
</head>
<body class="flex flex-col items-center min-h-screen pt-20">

    <h1 class="text-4xl md:text-6xl font-serif font-bold mb-32 z-20">What I can do for you?</h1>

    <div class="relative w-full max-w-7xl flex items-center justify-center central-node">
        
        <svg class="hexagon-frame" viewBox="0 0 1000 600">
            <path id="path-hex" d="M 500 50 L 800 175 L 800 425 L 500 550 L 200 425 L 200 175 Z" fill="none" stroke="#d4af37" stroke-width="2" />
        </svg>

        <div id="bullet-points-container"></div>

        <div class="flex flex-col items-center">
            <div id="orbiting-design" class="orbiting-text">Digital Design</div>
            <div class="text-9xl font-extrabold tracking-tighter mb-4 text-[#fafafa]">JN</div>
            <div id="orbiting-dev" class="orbiting-text">Frontend Web Developer</div>
            <div class="text-[12px] uppercase tracking-[5px] text-[#ffebc4]">Creative Developer</div>
        </div>

        <div id="services-grid" class="absolute w-full h-full"></div>
        
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        const servicesData = [
            { id: 1, title: 'Web Design & Build', desc: 'From landing pages to full web apps - responsive, fast, and on-brand.', list: ['HTML/CSS/JS', 'WordPress design & setup', 'Webflow & Framer sites'] },
            { id: 2, title: 'Visual & Digital Design', desc: 'Graphic assets, social media visuals, ads, and UI.', list: ['Social media graphics', 'Digital ad creatives', 'Landing page layouts'] },
            { id: 3, title: 'Motion & Video Content', desc: 'Promotional video, motion graphics, and short-form content for social.', list: ['After Effects animations', 'CapCut video editing', 'AI-generated video (Veo 3)'] },
            { id: 4, title: 'Interactive UX', desc: 'Engaging web experiences with animation, sound, and real-time effects.', list: ['Canvas API animations', 'Web Audio integration', 'Smooth micro-interactions'] },
            { id: 5, title: 'AI-Powered Workflows', desc: 'Using AI tools to produce more, faster - without losing creative direction.', list: ['AI image gen (Nano Banana Pro)', 'AI video (Veo 3, Kling, Whisk)', 'Rapid prototyping & ideation'] },
            { id: 6, title: 'Digital Marketing', desc: 'Aligning content with business goals.', list: ['On-page SEO basics', 'Product Hunt launches', 'Social media strategy'] },
        ];

        const gridContainer = document.getElementById('services-grid');
        const bulletsContainer = document.getElementById('bullet-points-container');
        const path = document.getElementById('path-hex');
        const pathLength = path.getTotalLength();

        servicesData.forEach((s, i) => {
            const pointOnPath = path.getPointAtLength((i / 6) * pathLength);
            
            // Icon
            const iconCircle = document.createElement('div');
            iconCircle.className = 'icon-circle';
            iconCircle.id = `icon-${s.id}`;
            iconCircle.innerHTML = s.id === 3 ? '<span class="text-3xl">🎬</span>' : '<span class="text-3xl">🧩</span>'; // Keep icons
            gridContainer.appendChild(iconCircle);

            // Card
            const card = document.createElement('div');
            card.className = 'service-card';
            card.id = `card-${s.id}`;
            card.innerHTML = `
                <div class="flex items-center gap-4">
                    <div class="card-number">${s.id}.</div>
                    <div class="flex flex-col">
                        <h3 class="text-lg font-bold">${s.title}</h3>
                        <p class="text-sm text-gray-700">${s.desc}</p>
                        <ul class="text-sm text-gray-600 mt-2 space-y-1">
                            ${s.list.map(item => `<li>— ${item}</li>`).join('')}
                        </ul>
                    </div>
                </div>
            `;
            gridContainer.appendChild(card);

            // Bullet Point
            const bullet = document.createElement('div');
            bullet.className = 'bullet-point';
            bullet.id = `bullet-${s.id}`;
            bullet.style.left = `${pointOnPath.x}px`;
            bullet.style.top = `${pointOnPath.y}px`;
            bulletsContainer.appendChild(bullet);
        });

        // 1. Initial Icon and Card Reveal Timeline
        const revealTL = gsap.timeline();
        revealTL.from('.icon-circle', { opacity: 0, scale: 0, stagger: 0.1, duration: 0.8, ease: "back.out(1.7)" })
                .from('.service-card', { opacity: 0, scale: 0, stagger: 0.1, duration: 0.8, ease: "back.out(1.7)" }, "-=0.6");

        // 2. Main Progress Timeline (Gold line and progressive reveal)
        const progressTL = gsap.timeline();
        progressTL.fromTo("#path-hex", { strokeDasharray: pathLength, strokeDashoffset: pathLength }, { strokeDashoffset: 0, duration: 4, ease: "power2.inOut" });

        // Synchronize card reveal with progress
        servicesData.forEach((s, i) => {
            progressTL.to(`#bullet-${s.id}`, { className: "+=bullet-point-revealed", duration: 0.1 }, (i / 6) * 4);
            progressTL.to(`#card-${s.id}`, { scale: 1.1, boxShadow: "0 10px 20px rgba(212, 175, 55, 0.4)", duration: 0.3 }, (i / 6) * 4);
            progressTL.to(`#card-${s.id}`, { scale: 1, boxShadow: "0 4px 10px rgba(0, 0, 0, 0.2)", duration: 0.3 }, (i / 6) * 4 + 0.3);
        });

        // 3. Orbiting Animation
        gsap.to('#orbiting-design', {
            duration: 6, repeat: -1, ease: "none",
            onUpdate: function() {
                const time = (Date.now() * 0.001 * 0.5) + Math.PI;
                const x = Math.cos(time) * 200;
                const z = Math.sin(time) * 150;
                const scale = (z + 150) / 300 * 0.5 + 0.5;
                gsap.set('#orbiting-design', { x: x, y: 120, z: z, scale: scale, opacity: scale, zIndex: z > 0 ? 12 : 8 });
            }
        });

        gsap.to('#orbiting-dev', {
            duration: 6, repeat: -1, ease: "none",
            onUpdate: function() {
                const time = (Date.now() * 0.001 * 0.5);
                const x = Math.cos(time) * 200;
                const z = Math.sin(time) * 150;
                const scale = (z + 150) / 300 * 0.5 + 0.5;
                gsap.set('#orbiting-dev', { x: x, y: -20, z: z, scale: scale, opacity: scale, zIndex: z > 0 ? 12 : 8 });
            }
        });

    </script>
</body>
</html>

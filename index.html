<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN - The Ultimate 3D Gold Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; cursor: none; }
        
        #bg-canvas { position: fixed; inset: 0; z-index: -1; }
        #cursor-dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; }
        #cursor-glow { width: 400px; height: 400px; background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%); position: fixed; top: -200px; left: -200px; pointer-events: none; z-index: 999; }

        .main-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1500px; }

        /* JN 3D Rotation */
        .jn-system { position: relative; z-index: 100; transform-style: preserve-3d; }
        #jn-logo { 
            font-size: 110px; font-weight: 900; letter-spacing: -8px; color: #fff; 
            display: inline-block; transform-style: preserve-3d; 
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.1));
        }
        
        /* Rotating Badge */
        #badge-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; height: 320px; pointer-events: none; }
        .badge-text { font-size: 11px; font-weight: 800; text-transform: uppercase; fill: var(--gold); letter-spacing: 5px; }

        /* Layout Positions */
        .top-header { position: absolute; top: 5%; width: 100%; text-align: center; }
        .top-header h1 { font-size: 48px; font-weight: 900; letter-spacing: -1px; margin-bottom: 0; }

        #hex-svg { position: absolute; width: 500px; height: 500px; pointer-events: none; top: 52%; left: 50%; transform: translate(-50%, -50%); }
        .draw-hex { fill: none; stroke: var(--gold); stroke-width: 1.5; stroke-dasharray: 1800; stroke-dashoffset: 1800; opacity: 0.4; }

        /* Service Cards - Gold Frames */
        .card-wrapper { position: absolute; z-index: 110; }
        .service-card {
            width: 240px; padding: 18px; 
            border: 1px solid var(--gold); background: rgba(0,0,0,0.6);
            opacity: 0; transform: translateY(20px);
            cursor: pointer; transform-style: preserve-3d; transition: background 0.3s;
        }
        .service-card:hover { background: rgba(212, 175, 55, 0.05); }
        
        .card-title { font-weight: 800; font-size: 13px; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }
        .card-sub { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        
        /* White text bullet points */
        .card-content { 
            max-height: 0; overflow: hidden; opacity: 0; transition: all 0.5s ease;
            border-top: 0px solid rgba(212, 175, 55, 0.3); margin-top: 0;
        }
        .service-card.open .card-content { max-height: 200px; opacity: 1; margin-top: 12px; padding-top: 12px; border-top-width: 1px; }
        .bullet-list { font-size: 11px; color: #ffffff; list-style: none; line-height: 1.6; }
        .bullet-list li::before { content: "• "; color: var(--gold); margin-right: 5px; }
        
        .card-icon { font-size: 22px; position: absolute; top: -12px; right: -12px; }
    </style>
</head>
<body>

    <div id="cursor-dot"></div>
    <div id="cursor-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="main-container">
        <div class="top-header">
            <h1>What I can do <span style="color:var(--gold); font-style: italic;">for you?</span></h1>
        </div>

        <div class="jn-system">
            <div id="jn-logo">JN</div>
            <svg id="badge-svg" viewBox="0 0 200 200">
                <path id="badgePath" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0" fill="none" />
                <text class="badge-text">
                    <textPath href="#badgePath" startOffset="0%">
                        • DIGITAL DESIGN • FRONTEND WEB DEVELOPER • DIGITAL DESIGN • FRONTEND WEB DEVELOPER
                    </textPath>
                </text>
            </svg>
            <div style="font-size: 9px; letter-spacing: 5px; text-transform: uppercase; color: #444; font-weight: 800; margin-top: 5px; text-align: center;">Creative Developer</div>
        </div>

        <svg id="hex-svg" viewBox="0 0 600 600">
            <path class="draw-hex" id="active-line" d="M 300 50 L 516 175 L 516 425 L 300 550 L 84 425 L 84 175 Z" />
        </svg>

        <div id="elements-layer"></div>
    </div>

    <script>
        const services = [
            { icon: "🎨", title: "Web Design & Build", sub: "Landing pages & Apps", items: ["HTML/CSS/JS", "WordPress & Webflow", "Framer sites"] },
            { icon: "🧩", title: "Visual Design", sub: "Branding & Assets", items: ["Social Graphics", "Digital Ads", "UI Components"] },
            { icon: "🎬", title: "Motion & Video", sub: "Short-form content", items: ["After Effects", "CapCut", "AI Video (Veo 3)"] },
            { icon: "✨", title: "Interactive UX", sub: "Experience design", items: ["Canvas API", "Web Audio", "Micro-interactions"] },
            { icon: "🤖", title: "AI-Powered", sub: "Efficiency & Tech", items: ["AI Image Gen", "Rapid Prototyping", "AI Copywriting"] },
            { icon: "📊", title: "Marketing", sub: "Growth & SEO", items: ["On-page SEO", "Product Hunt", "Social Strategy"] }
        ];

        // 1. Background Particles
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        let particles = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.dispatchEvent(new Event('resize'));
        class Particle {
            constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.s = Math.random()*2; this.v = Math.random()*0.5; }
            draw() { ctx.fillStyle = 'rgba(212, 175, 55, 0.3)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2); ctx.fill(); }
            update() { this.y -= this.v; if(this.y < 0) this.y = canvas.height; }
        }
        for(let i=0; i<100; i++) particles.push(new Particle());
        function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); particles.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(anim); } anim();

        // 2. Hex Layout
        const layer = document.getElementById('elements-layer');
        const cx = window.innerWidth/2; const cy = window.innerHeight/2 + 30; const r = 250;
        const pts = [{x:cx, y:cy-r}, {x:cx+r*0.866, y:cy-r*0.5}, {x:cx+r*0.866, y:cy+r*0.5}, {x:cx, y:cy+r}, {x:cx-r*0.866, y:cy+r*0.5}, {x:cx-r*0.866, y:cy-r*0.5}];

        services.forEach((s, i) => {
            const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
            const ang = (i * 60 - 90) * (Math.PI/180);
            wrap.style.left = `${pts[i].x + Math.cos(ang)*110 - 120}px`;
            wrap.style.top = `${pts[i].y + Math.sin(ang)*60 - 60}px`;
            wrap.innerHTML = `<div class="service-card" onclick="this.classList.toggle('open')"><div class="card-icon">${s.icon}</div><div class="card-title">${i+1}. ${s.title}</div><div class="card-sub">${s.sub}</div><div class="card-content"><ul class="bullet-list">${s.items.map(li => `<li>${li}</li>`).join('')}</ul></div></div>`;
            layer.appendChild(wrap);
        });

        // 3. Animations
        const tl = gsap.timeline();
        
        // JN Auto-rotate
        gsap.to("#jn-logo", { rotationY: 360, duration: 8, repeat: -1, ease: "none" });
        // Badge rotate
        gsap.to("#badge-svg", { rotation: -360, duration: 20, repeat: -1, ease: "none" });

        tl.from(".top-header", { y: -50, opacity: 0, duration: 1 })
          .from(".jn-system", { scale: 0, opacity: 0, duration: 1 }, "-=0.5")
          .to("#active-line", { strokeDashoffset: 0, duration: 6, ease: "none", onUpdate: function() {
              const p = this.progress(); 
              document.querySelectorAll('.service-card').forEach((card, i) => { if(p >= i/6) gsap.to(card, { opacity: 1, y: 0, duration: 0.4, overwrite: "auto" }); });
          }});

        window.addEventListener('mousemove', (e) => {
            gsap.to("#cursor-dot", { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to("#cursor-glow", { x: e.clientX, y: e.clientY, duration: 0.4 });
            document.querySelectorAll('.service-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width/2)/10;
                const y = (e.clientY - rect.top - rect.height/2)/10;
                gsap.to(card, { rotationY: x, rotationX: -y, duration: 0.4 });
            });
        });
    </script>
</body>
</html>

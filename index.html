<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JN - Precision Minimalist Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; cursor: none; }
        
        /* Nền đen chấm vàng */
        #bg-canvas { position: fixed; inset: 0; z-index: -1; }
        
        /* Chuột Spotlight */
        #cursor-glow { 
            position: fixed; width: 450px; height: 450px; 
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, transparent 70%); 
            pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); 
        }

        .main-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; perspective: 1500px; }

        /* Tiêu đề trên cùng */
        .top-header { position: absolute; top: 6%; text-align: center; z-index: 200; }
        .top-header h1 { font-size: 48px; font-weight: 900; letter-spacing: -1px; }
        .top-header span { color: var(--gold); font-style: italic; }

        /* JN Center - Style hạt xoay */
        .jn-system { position: relative; z-index: 50; transform-style: preserve-3d; }
        #jn-logo { 
            font-size: 110px; font-weight: 900; letter-spacing: -8px; 
            background: url('https://www.transparenttextures.com/patterns/asfalt-dark.png'), linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.4));
            animation: rotateJN 10s linear infinite; display: inline-block;
        }
        @keyframes rotateJN { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* Badge văn bản xoay */
        #badge-svg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 340px; height: 340px; pointer-events: none; animation: spinBadge 25s linear infinite; }
        @keyframes spinBadge { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .badge-text { font-size: 11px; font-weight: 800; fill: var(--gold); letter-spacing: 5px; text-transform: uppercase; }

        /* Lục giác mờ */
        #hex-svg { position: absolute; width: 480px; height: 480px; pointer-events: none; top: 52%; left: 50%; transform: translate(-50%, -50%); }
        .draw-hex { fill: none; stroke: var(--gold); stroke-width: 1; stroke-dasharray: 1800; stroke-dashoffset: 1800; opacity: 0.3; }

        /* Service Cards - Hình chữ nhật thẳng, viền vàng mảnh */
        .card-wrapper { position: absolute; z-index: 110; }
        .service-card {
            width: 240px; padding: 18px; 
            border: 1px solid var(--gold); background: rgba(0,0,0,0.8);
            opacity: 0; transform: translateY(20px);
            transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .service-card:hover { border-width: 2px; background: rgba(212, 175, 55, 0.05); }
        
        .card-title { font-weight: 800; font-size: 13px; color: var(--gold); text-transform: uppercase; margin-bottom: 2px; }
        .card-sub { font-size: 9px; color: #666; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        
        /* Nội dung chữ trắng hiện sẵn */
        .bullet-list { font-size: 11px; color: #ffffff; list-style: none; line-height: 1.7; border-top: 1px solid rgba(212, 175, 55, 0.2); padding-top: 10px; }
        .bullet-list li::before { content: "• "; color: var(--gold); font-weight: bold; margin-right: 5px; }
        
        .card-icon { position: absolute; top: -12px; right: -12px; font-size: 22px; }
    </style>
</head>
<body>

    <div id="cursor-glow"></div>
    <canvas id="bg-canvas"></canvas>

    <div class="main-container">
        <div class="top-header">
            <h1>What I can do <span>for you?</span></h1>
        </div>

        <div class="jn-system">
            <div id="jn-logo">JN</div>
            <svg id="badge-svg" viewBox="0 0 200 200">
                <path id="bp" d="M 100, 100 m -80, 0 a 80,80 0 1,1 160,0 a 80,80 0 1,1 -160,0" fill="none" />
                <text class="badge-text"><textPath href="#bp">• DIGITAL DESIGN • FRONTEND WEB DEVELOPER • DIGITAL DESIGN • FRONTEND WEB DEVELOPER</textPath></text>
            </svg>
            <div style="font-size: 9px; letter-spacing: 5px; color: #444; font-weight: 800; text-transform: uppercase; margin-top: 5px; text-align: center;">Creative Developer</div>
        </div>

        <svg id="hex-svg" viewBox="0 0 600 600">
            <path class="draw-hex" id="active-line" d="M 300 50 L 516 175 L 516 425 L 300 550 L 84 425 L 84 175 Z" />
        </svg>

        <div id="cards-layer"></div>
    </div>

    <script>
        const services = [
            { icon: "🎨", title: "Web Design & Build", sub: "Landing pages & Apps", items: ["HTML/CSS/JS", "WordPress & Webflow", "Framer sites"] },
            { icon: "🧩", title: "Visual Design", sub: "Branding & Assets", items: ["Social Graphics", "Digital Ads", "UI Components"] },
            { icon: "🎬", title: "Motion & Video", sub: "Short-form content", items: ["After Effects", "CapCut", "AI Video (Veo 3)"] },
            { icon: "✨", title: "Interactive UX", sub: "Experience design", items: ["Canvas API", "Web Audio", "Micro-interactions"] },
            { icon: "🤖", title: "AI-Powered", sub: "Efficiency & Tech", items: ["AI Image Gen (Nano Banana Pro)", "AI Video (Veo 3, Kling)", "Rapid prototyping"] },
            { icon: "📈", title: "Marketing", sub: "Growth & SEO", items: ["On-page SEO", "Product Hunt", "Social Strategy"] }
        ];

        // 1. Background Particles
        const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d');
        let dots = [];
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        window.dispatchEvent(new Event('resize'));
        for(let i=0; i<150; i++) dots.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, s: Math.random()*1.5});
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle = 'rgba(212, 175, 55, 0.2)';
            dots.forEach(d => { ctx.beginPath(); ctx.arc(d.x, d.y, d.s, 0, Math.PI*2); ctx.fill(); });
            requestAnimationFrame(anim);
        }
        anim();

        // 2. Rectangular Card Layout
        const layer = document.getElementById('cards-layer');
        const cx = window.innerWidth/2; const cy = window.innerHeight/2 + 60; const r = 250;
        const pts = [{x:cx, y:cy-r}, {x:cx+r*0.866, y:cy-r*0.5}, {x:cx+r*0.866, y:cy+r*0.5}, {x:cx, y:cy+r}, {x:cx-r*0.866, y:cy+r*0.5}, {x:cx-r*0.866, y:cy-r*0.5}];

        services.forEach((s, i) => {
            const wrap = document.createElement('div'); wrap.className = 'card-wrapper';
            const ang = (i * 60 - 90) * (Math.PI/180);
            wrap.style.left = `${pts[i].x + Math.cos(ang)*115 - 120}px`;
            wrap.style.top = `${pts[i].y + Math.sin(ang)*60 - 60}px`;

            wrap.innerHTML = `
                <div class="service-card">
                    <div class="card-icon">${s.icon}</div>
                    <div class="card-title">${i+1}. ${s.title}</div>
                    <div class="card-sub">${s.sub}</div>
                    <ul class="bullet-list">${s.items.map(li => `<li>${li}</li>`).join('')}</ul>
                </div>
            `;
            layer.appendChild(wrap);
        });

        // 3. Animations & Mouse Interaction
        const tl = gsap.timeline();
        tl.to("#active-line", { strokeDashoffset: 0, duration: 6, ease: "none", onUpdate: function() {
            const p = this.progress();
            document.querySelectorAll('.service-card').forEach((card, i) => { if(p >= i/6) gsap.to(card, { opacity: 1, y: 0, duration: 0.5 }); });
        }});

        window.addEventListener('mousemove', (e) => {
            gsap.to("#cursor-glow", { x: e.clientX, y: e.clientY, duration: 0.5 });
            document.querySelectorAll('.service-card').forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = (e.clientX - rect.left - rect.width/2)/15;
                const y = (e.clientY - rect.top - rect.height/2)/15;
                gsap.to(card, { rotationY: x, rotationX: -y, duration: 0.5 });
            });
        });
    </script>
</body>
</html>

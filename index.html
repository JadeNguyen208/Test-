<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jade Nguyen Services - Precision 3D</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        black: '#030303',
                        gold: '#D4AF37',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'serif'],
                        sans: ['"Inter"', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #030303;
            color: #ffffff;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            cursor: none;
        }

        /* Spotlight & Cursor */
        #cursor-trail {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
        }
        
        .cursor-particle {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #D4AF37;
            border-radius: 50%;
            pointer-events: none;
        }

        #spotlight-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            background: radial-gradient(circle at center, transparent 0%, rgba(3, 3, 3, 0.9) 100%);
        }

        /* Central Hexagon System */
        .central-system {
            position: relative;
            z-index: 10;
        }

        #particle-gathering-canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
        }

        /* Floating Cards */
        .service-card {
            position: absolute;
            width: 280px;
            padding: 25px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid transparent;
            border-radius: 10px;
            transition: transform 0.3s ease, background-color 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
            cursor: pointer;
            z-index: 100;
        }

        .service-card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(3deg);
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #D4AF37;
            transition: transform 0.3s ease-out, background-color 0.3s ease-out;
        }

        .icon-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 10px;
            background-color: #D4AF37;
            color: #030303;
            font-size: 1.2rem;
        }

        .service-card h3 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: #D4AF37;
            margin: 0;
            font-style: italic;
        }

        .bullet-list {
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        .bullet-list li::before {
            content: "•";
            color: #D4AF37;
            margin-right: 10px;
        }
    </style>
</head>
<body class="flex flex-col items-center">
    <div id="spotlight-mask"></div>
    <div id="cursor-trail"></div>

    <header class="flex justify-between items-center px-16 py-8 fixed w-full top-0 left-0 z-50">
        <div class="logo-box border-2 border-gold p-4 rounded text-center">
            <span class="font-serif text-2xl text-gold">Jade Nguyen</span>
        </div>
        <ul class="nav-menu flex gap-8 text-sm uppercase font-semibold text-white">
            <li><a href="#" class="nav-link hover:text-gold transition">ABOUT</a></li>
            <li><a href="#" class="nav-link hover:text-gold transition">SERVICES</a></li>
            <li><a href="#" class="nav-link hover:text-gold transition">PROJECT</a></li>
            <li><a href="#" class="nav-link hover:text-gold transition">SKILLS</a></li>
            <li><a href="#" class="nav-link hover:text-gold transition">CONTACT</a></li>
        </ul>
        <button class="save-pdf-btn bg-gold text-black px-6 py-3 rounded text-sm uppercase font-bold">
            SAVE PDF <span class="ml-2">&#11123;</span>
        </button>
    </header>

    <div class="main-content flex flex-col items-center mt-40 px-16 pb-20 w-full max-w-7xl relative">
        <div class="title text-center mb-16 z-20">
            <span class="services-label font-sans text-sm uppercase tracking-widest text-gold mb-4 block">SERVICES</span>
            <h1 class="font-serif text-6xl leading-tight">What I can do <span class="font-bold italic text-gold">for you</span></h1>
        </div>

        <div class="central-system w-full h-[60vh] flex justify-center items-center mb-24 relative">
            <canvas id="particle-gathering-canvas"></canvas>
            <div id="services-grid" class="absolute w-full h-full"></div>
        </div>
    </div>

    <script>
        const servicesData = [
            { id: 1, title: 'Web Design & Build', desc: 'From landing pages to full web apps — responsive, fast, and on-brand.', list: ['HTML/CSS/JS from scratch', 'WordPress design & setup', 'Webflow & Framer sites', 'Cross-browser compatible'] },
            { id: 2, title: 'Visual & Digital Design', desc: 'Graphic assets, style guides, and brand-consistent UI.', list: ['Social media graphics', 'Digital ad creatives', 'Marketing collaterals', 'UI components & icons'] },
            { id: 3, title: 'Motion & Video Content', desc: 'Promotional video, motion graphics, and short-form content for social.', list: ['After Effects animations', 'CapCut video editing', 'AI-generated video (Veo 3, Kling)', 'Product launch content'] },
            { id: 4, title: 'Interactive UX', desc: 'Engaging web experiences with animation, sound, and real-time effects.', list: ['Canvas API animations', 'Web Audio integration', 'Smooth micro-interactions', 'Multi-language support'] },
            { id: 5, title: 'AI-Powered Workflows', desc: 'Using AI tools to produce more, faster — without losing creative direction.', list: ['AI image gen (Nano Banana Pro)', 'AI video (Veo 3, Kling, Whisk)', 'Rapid prototyping & ideation', 'AI-assisted copywriting'] },
            { id: 6, title: 'Digital Marketing', desc: 'BSc-level background in marketing — aligning content with business goals.', list: ['On-page SEO basics', 'Product Hunt launches', 'Social media strategy', 'Content planning'] },
        ];

        const centralCanvas = document.getElementById('particle-gathering-canvas');
        const gridContainer = document.getElementById('services-grid');
        const width = centralCanvas.offsetWidth;
        const height = centralCanvas.offsetHeight;
        
        // Three.js for Particle Gathering
        let scene, camera, renderer, particlesGeometry, particleSystem;
        const particleCount = 2000;
        const positions = new Float32Array(particleCount * 3);
        const finalPositions = new Float32Array(particleCount * 3);
        
        function initThreeJS() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, width / height, 1, 1000);
            camera.position.z = 250;
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, canvas: centralCanvas });
            renderer.setSize(width, height);

            // Create Scatter Points
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                positions[i3] = (Math.random() - 0.5) * 400;
                positions[i3 + 1] = (Math.random() - 0.5) * 400;
                positions[i3 + 2] = (Math.random() - 0.5) * 400;
            }
            
            // Generate final target positions based on a simple "JN" path
            // This is a simplified path for demonstration
            const jnPathVertices = [
                -20, 20, 0,  -20, 10, 0,  -10, 10, 0,  -10, 20, 0,  // J part
                -20, -10, 0, -20, -20, 0, -10, -20, 0, -10, -10, 0,
                10, 20, 0,   10, -20, 0,  10, 20, 0,   20, -20, 0,  20, 20, 0,   // N part
                20, -20, 0,  20, 20, 0
            ];
            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;
                const pathIdx = (i % jnPathVertices.length) / 3;
                const p3 = pathIdx * 3;
                finalPositions[i3] = jnPathVertices[p3];
                finalPositions[i3+1] = jnPathVertices[p3+1];
                finalPositions[i3+2] = 0;
            }

            particlesGeometry = new THREE.BufferGeometry();
            particlesGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particlesGeometry.setAttribute('target', new THREE.BufferAttribute(finalPositions, 3));

            const material = new THREE.PointsMaterial({ size: 1.5, color: 0xD4AF37, transparent: true, opacity: 0.8 });
            particleSystem = new THREE.Points(particlesGeometry, material);
            scene.add(particleSystem);
        }
        initThreeJS();

        // Create Grid Cards
        servicesData.forEach((s, i) => {
            const angle = (i / 6) * Math.PI * 2;
            const x = Math.cos(angle) * 120 + width / 2;
            const y = Math.sin(angle) * 120 + height / 2;
            
            const card = document.createElement('div');
            card.className = 'service-card';
            card.style.left = `${x - 140}px`;
            card.style.top = `${y - 120}px`;
            
            // Select icon based on service
            const icons = ['&#127760;', '&#127832;', '&#127916;', '&#9889;', '&#129302;', '&#128200;'];

            card.innerHTML = `
                <div class="icon-circle">${icons[i]}</div>
                <h3>${s.title}</h3>
                <p>${s.desc}</p>
                <ul class="bullet-list">${s.list.map(item => `<li>${item}</li>`).join('')}</ul>
            `;
            gridContainer.appendChild(card);
        });

        // GSAP Timelines
        const tl = gsap.timeline({ repeat: -1 });

        // Phase 1: Gathering
        tl.to(particlesGeometry.attributes.position.array, {
            endArray: finalPositions,
            duration: 3,
            ease: "power2.inOut",
            onUpdate: function() {
                particlesGeometry.attributes.position.needsUpdate = true;
            }
        }, "gathering")
        .to(particleSystem.rotation, { y: Math.PI * 2, duration: 15, ease: "linear" }, "gathering+=2"); // Rotate after gathering

        // Spotlight & Cursor Trail
        const cursorMask = document.getElementById('spotlight-mask');
        const cursorTrail = document.getElementById('cursor-trail');
        const particlesTrail = [];

        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            cursorMask.style.background = `radial-gradient(circle at ${x}px ${y}px, transparent 0%, rgba(3, 3, 3, 0.9) 100%)`;
            
            // Create cursor particle
            const p = document.createElement('div');
            p.className = 'cursor-particle';
            p.style.left = `${x}px`;
            p.style.top = `${y}px`;
            cursorTrail.appendChild(p);
            
            gsap.to(p, {
                x: (Math.random() - 0.5) * 50,
                y: (Math.random() - 0.5) * 50,
                opacity: 0,
                scale: 0.1,
                duration: 1.2,
                onComplete: () => p.remove()
            });
        });

    </script>
</body>
</html>

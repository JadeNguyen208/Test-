<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jade Nguyen - $50k Interactive Experience</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #D4AF37; }
        body { background-color: #ffffff; color: #111; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        /* Cursor */
        #cursor { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; }
        #cursor-f { width: 35px; height: 35px; border: 1px solid var(--gold); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; }

        .main-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* JN Stylized Center */
        .jn-wrapper { position: relative; z-index: 50; text-align: center; }
        #jn-logo { font-size: 100px; font-weight: 900; letter-spacing: -8px; position: relative; display: inline-block; }
        .jn-subtext { font-size: 10px; letter-spacing: 5px; color: var(--gold); font-weight: 800; text-transform: uppercase; margin-top: -15px; }

        /* SVG Circle Path */
        #orbit-svg { position: absolute; width: 800px; height: 800px; pointer-events: none; transform: rotate(-90deg); }
        .base-circle { fill: none; stroke: #f0f0f0; stroke-width: 1; }
        .progress-circle { fill: none; stroke: var(--gold); stroke-width: 2; stroke-dasharray: 2512; stroke-dashoffset: 2512; }

        /* Dots & Cards */
        .node { position: absolute; width: 12px; height: 12px; background: white; border: 2px solid #ddd; border-radius: 50%; z-index: 60; opacity: 0; transform: scale(0); transition: all 0.3s ease; }
        .node.active { opacity: 1; transform: scale(1); border-color: var(--gold); background: var(--gold); box-shadow: 0 0 15px var(--gold); }

        .info-card {
            position: absolute; width: 280px; padding: 20px; background: white;
            border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            opacity: 0; transform: translateY(20px); pointer-events: none; z-index: 70;
            border-left: 3px solid var(--gold);
        }
        .info-card.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

        .item-num { font-family: 'Playfair Display'; color: var(--gold); font-weight: bold; font-size: 1.2rem; }
        .bullet-list { font-size: 0.75rem; color: #666; margin-top: 8px; list-style: none; }
        .bullet-list li::before { content: "— "; color: var(--gold); }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div id="cursor-f"></div>

    <div class="main-container">
        <div class="jn-wrapper">
            <div id="jn-logo">JN</div>
            <div class="jn-subtext">Creative Developer</div>
        </div>

        <svg id="orbit-svg" viewBox="0 0 800 800">
            <circle class="base-circle" cx="400" cy="400" r="320" />
            <circle class="progress-circle" id="main-path" cx="400" cy="400" r="320" />
        </svg>

        <div id="nodes-container"></div>
    </div>

    <script>
        // Data content
        const services = [
            { title: "Web Design & Build", desc: "Landing pages & Apps", items: ["HTML/CSS/JS", "WordPress & Webflow", "Framer sites"] },
            { title: "Visual Design", desc: "Branding & Assets", items: ["Social Graphics", "Digital Ads", "UI Components"] },
            { title: "Motion & Video", desc: "Short-form content", items: ["After Effects", "CapCut", "AI Video (Veo 3)"] },
            { title: "Interactive UX", desc: "Experience design", items: ["Canvas API", "Web Audio", "Micro-interactions"] },
            { title: "AI-Powered", desc: "Efficiency & Tech", items: ["AI Image Gen", "Rapid Prototyping", "AI Copywriting"] },
            { title: "Marketing", desc: "Growth & SEO", items: ["On-page SEO", "Product Hunt", "Social Strategy"] }
        ];

        const container = document.getElementById('nodes-container');
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        const radius = 320;

        // Create Nodes and Cards
        services.forEach((s, i) => {
            const angle = (i * 60) * (Math.PI / 180) - (Math.PI / 2);
            const x = centerX + radius * Math.cos(angle);
            const y = centerY + radius * Math.sin(angle);

            // Node dot
            const node = document.createElement('div');
            node.className = `node node-${i}`;
            node.style.left = `${x - 6}px`;
            node.style.top = `${y - 6}px`;
            container.appendChild(node);

            // Info Card
            const card = document.createElement('div');
            card.className = `info-card card-${i}`;
            // Adjust card position to not overlap circle
            const cardX = centerX + (radius + 160) * Math.cos(angle);
            const cardY = centerY + (radius + 50) * Math.sin(angle);
            card.style.left = `${cardX - 140}px`;
            card.style.top = `${cardY - 60}px`;

            card.innerHTML = `
                <p class="item-num">${i + 1}. ${s.title}</p>
                <p class="text-[10px] text-gray-400 uppercase font-bold">${s.desc}</p>
                <ul class="bullet-list">${s.items.map(item => `<li>${item}</li>`).join('')}</ul>
            `;
            container.appendChild(card);
        });

        // --- Animations ---
        const tl = gsap.timeline();

        // 1. JN Drop
        tl.from("#jn-logo", { y: -200, opacity: 0, duration: 1.5, ease: "bounce.out" })
          .from(".jn-subtext", { opacity: 0, trackingSpacing: 20, duration: 1 }, "-=0.5");

        // 2. Draw Circle Path and Reveal Nodes
        tl.to("#main-path", {
            strokeDashoffset: 0,
            duration: 4,
            ease: "power2.inOut",
            onUpdate: function() {
                const progress = this.progress();
                services.forEach((_, i) => {
                    if (progress >= i / 5) {
                        document.querySelector(`.node-${i}`).classList.add('active');
                        document.querySelector(`.card-${i}`).classList.add('visible');
                    }
                });
            }
        });

        // 3. Floating Effect for Cards
        gsap.to(".info-card", {
            y: "-=10",
            duration: 2,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            stagger: 0.2
        });

        // Cursor
        window.addEventListener('mousemove', (e) => {
            gsap.to("#cursor", { x: e.clientX, y: e.clientY, duration: 0.1 });
            gsap.to("#cursor-f", { x: e.clientX - 17, y: e.clientY - 17, duration: 0.3 });
        });

        // Card Hover
        document.querySelectorAll('.info-card').forEach(card => {
            card.addEventListener('mouseenter', () => {
                gsap.to(card, { scale: 1.05, borderColor: '#D4AF37', duration: 0.3 });
                gsap.to("#cursor-f", { scale: 1.5, borderColor: '#111', duration: 0.3 });
            });
            card.addEventListener('mouseleave', () => {
                gsap.to(card, { scale: 1, borderColor: '#D4AF37', duration: 0.3 });
                gsap.to("#cursor-f", { scale: 1, borderColor: '#D4AF37', duration: 0.3 });
            });
        });
    </script>
</body>
</html>
